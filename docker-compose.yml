services:
  postgres:
    image: postgres:17
    container_name: nkab-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nkab
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: nkab_vault
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: